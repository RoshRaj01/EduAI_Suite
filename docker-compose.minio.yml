# MinIO Docker Configuration for Local S3-compatible Storage
# Provides S3 API compatibility for local development and testing

version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: edui-minio
    ports:
      - "9000:9000" # MinIO API
      - "9001:9001" # MinIO Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - edui-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: edui-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add minio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb minio/edui-presentations --ignore-existing;
      /usr/bin/mc anonymous set public minio/edui-presentations;
      exit 0;
      "
    networks:
      - edui-network

volumes:
  minio_data:

networks:
  edui-network:
    driver: bridge
